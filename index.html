<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>USB Mario — Plug & Play Platformer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{
  background:#000;
  width:100%;height:100vh;
  overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  font-family:'Courier New',monospace;
}
canvas{
  display:block;
  image-rendering:pixelated;
  image-rendering:crisp-edges;
  cursor:none;
}
#ui{
  position:fixed;top:0;left:0;right:0;bottom:0;
  display:flex;align-items:center;justify-content:center;
  pointer-events:none;z-index:10;
}
#overlay{
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,0.82);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:16px;z-index:20;color:#fff;text-align:center;
  font-family:'Courier New',monospace;
}
#overlay h1{font-size:clamp(28px,5vw,56px);color:#e8a000;text-shadow:3px 3px #7a3800;letter-spacing:2px}
#overlay .sub{font-size:clamp(12px,2vw,18px);color:#aaa;max-width:500px;line-height:1.6}
#overlay .keys{
  display:grid;grid-template-columns:repeat(3,1fr);gap:8px;
  margin:8px 0;font-size:clamp(10px,1.5vw,14px);
}
.key{background:#222;border:2px solid #555;border-radius:6px;padding:6px 10px;color:#e8a000}
.key span{display:block;color:#aaa;font-size:0.8em;margin-top:2px}
#overlay button{
  background:#e8a000;color:#000;border:none;
  padding:12px 40px;font-size:clamp(14px,2.5vw,20px);
  font-family:'Courier New',monospace;font-weight:700;
  border-radius:4px;cursor:pointer;letter-spacing:1px;
  box-shadow:4px 4px #7a3800;pointer-events:all;
}
#overlay button:hover{background:#ffb800;transform:translate(-1px,-1px);box-shadow:5px 5px #7a3800}
#overlay button:active{transform:translate(1px,1px);box-shadow:3px 3px #7a3800}
#gameover{display:none}
#gameover h1{color:#f44}
#gameover .score-big{font-size:clamp(20px,4vw,40px);color:#e8a000;margin:8px 0}
#win h1{color:#0f0}
.hidden{display:none!important}
</style>
</head>
<body>
<canvas id="c"></canvas>

<!-- Title screen -->
<div id="overlay" id="title">
  <h1>⭐ USB MARIO ⭐</h1>
  <div class="sub">A plug-and-play platformer. No install needed.<br>Just open this file and play!</div>
  <div class="keys">
    <div class="key">← →<span>Move</span></div>
    <div class="key">↑ / Z<span>Jump</span></div>
    <div class="key">Space<span>Jump</span></div>
    <div class="key">Shift<span>Run</span></div>
    <div class="key">R<span>Restart</span></div>
    <div class="key">P<span>Pause</span></div>
  </div>
  <button id="btnStart">PRESS START</button>
</div>

<!-- Game over -->
<div id="overlay" id="gameover" class="hidden" style="display:none">
  <h1>💀 GAME OVER</h1>
  <div class="score-big" id="goScore"></div>
  <div class="sub" id="goMsg"></div>
  <button id="btnRetry">TRY AGAIN</button>
</div>

<!-- Win screen -->
<div id="overlay" id="win" class="hidden" style="display:none">
  <h1>🏆 YOU WIN!</h1>
  <div class="score-big" id="winScore"></div>
  <div class="sub">You beat all 3 worlds!<br>You're a real USB hero.</div>
  <button id="btnPlayAgain">PLAY AGAIN</button>
</div>

// ── Responsive canvas ────────────────────────────────────────
const GAME_W = 800, GAME_H = 400;
let scale = 1;

function resize() {
  const sw = window.innerWidth  / GAME_W;
  const sh = window.innerHeight / GAME_H;
  scale = Math.min(sw, sh, 2.5);
  canvas.width  = GAME_W;
  canvas.height = GAME_H;
  canvas.style.width  = (GAME_W * scale) + 'px';
  canvas.style.height = (GAME_H * scale) + 'px';
}
window.addEventListener('resize', resize);
resize();

// ================================================================
//  Level data — 3 worlds, each a grid of tiles
//  0=empty 1=ground 2=brick 3=?block 4=pipe-bot 5=pipe-top
//  6=coin  7=qblock-used  8=solid  9=pipe-bot-tall
// ================================================================

function makeLevelTiles(rows) {
  // rows is array of strings, each char is a tile
  const map = [];
  for (let r = 0; r < rows.length; r++) {
    for (let c = 0; c < rows[r].length; c++) {
      const ch = rows[r][c];
      if (ch === ' ') continue;
      let type = 0;
      if (ch === 'G') type = 1; // ground
      if (ch === 'B') type = 2; // brick
      if (ch === '?') type = 3; // question block
      if (ch === 'P') type = 4; // pipe bottom
      if (ch === 'Q') type = 5; // pipe top (with collar)
      if (ch === 'C') type = 6; // coin
      if (ch === 'S') type = 8; // solid/stone
      if (type > 0) {
        map.push({ x: c * TILE, y: r * TILE, type, hit: false });
      }
    }
  }
  return map;
}

// ================================================================
//  Web Audio — all sounds generated programmatically
// ================================================================
let audioCtx = null;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function playTone(freq, type, duration, vol=0.3, startGain=null, endGain=0.001) {
  try {
    const ac  = getAudio();
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.connect(gain); gain.connect(ac.destination);
    osc.type = type;
    osc.frequency.setValueAtTime(freq, ac.currentTime);
    gain.gain.setValueAtTime(startGain ?? vol, ac.currentTime);
    gain.gain.exponentialRampToValueAtTime(endGain, ac.currentTime + duration);
    osc.start(ac.currentTime);
    osc.stop(ac.currentTime + duration);
  } catch(_) {}
}

const SFX = {
  jump() {
    try {
      const ac = getAudio(), osc = ac.createOscillator(), g = ac.createGain();
      osc.connect(g); g.connect(ac.destination);
      osc.type = 'square';
      osc.frequency.setValueAtTime(300, ac.currentTime);
      osc.frequency.exponentialRampToValueAtTime(600, ac.currentTime + 0.1);
      g.gain.setValueAtTime(0.2, ac.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.15);
      osc.start(); osc.stop(ac.currentTime + 0.15);
    } catch(_) {}
  },
  coin() {
    try {
      const ac = getAudio();
      [1047, 1319].forEach((f, i) => {
        const osc = ac.createOscillator(), g = ac.createGain();
        osc.connect(g); g.connect(ac.destination);
        osc.type = 'sine'; osc.frequency.value = f;
        const t = ac.currentTime + i * 0.08;
        g.gain.setValueAtTime(0.25, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
        osc.start(t); osc.stop(t + 0.16);
      });
    } catch(_) {}
  },
  stomp() {
    playTone(150, 'square', 0.12, 0.3);
  },
  block() {
    playTone(220, 'square', 0.08, 0.3);
    setTimeout(() => playTone(180, 'square', 0.08, 0.2), 60);
  },
  mushroom() {
    try {
      const ac = getAudio();
      [523, 659, 784, 1047].forEach((f, i) => {
        const osc = ac.createOscillator(), g = ac.createGain();
        osc.connect(g); g.connect(ac.destination);
        osc.type = 'square'; osc.frequency.value = f;
        const t = ac.currentTime + i * 0.1;
        g.gain.setValueAtTime(0.2, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
        osc.start(t); osc.stop(t + 0.13);
      });
    } catch(_) {}
  },
  die() {
    try {
      const ac = getAudio(), osc = ac.createOscillator(), g = ac.createGain();
      osc.connect(g); g.connect(ac.destination);
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(440, ac.currentTime);
      osc.frequency.exponentialRampToValueAtTime(50, ac.currentTime + 0.8);
      g.gain.setValueAtTime(0.3, ac.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.8);
      osc.start(); osc.stop(ac.currentTime + 0.8);
    } catch(_) {}
  },
  flag() {
    try {
      const ac = getAudio();
      const notes = [523,659,784,1047,784,1047,1319];
      notes.forEach((f, i) => {
        const osc = ac.createOscillator(), g = ac.createGain();
        osc.connect(g); g.connect(ac.destination);
        osc.type = 'sine'; osc.frequency.value = f;
        const t = ac.currentTime + i * 0.1;
        g.gain.setValueAtTime(0.25, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
        osc.start(t); osc.stop(t + 0.13);
      });
    } catch(_) {}
  },
  powerup() {
    SFX.mushroom();
  },
};

// ================================================================
//  Pixel-art drawing helpers (all with Canvas 2D)
// ================================================================

function drawPixelRect(x, y, w, h, color) {
  ctx.fillStyle = color;
  ctx.fillRect(x, y, w, h);
}

function drawTile(tile, cam) {
  const sx = tile.x - cam;
  const sy = tile.y;
  const T = TILE;

  if (tile.type === 1) { // Ground
    drawPixelRect(sx, sy, T, T, C.ground);
    drawPixelRect(sx, sy, T, 4, '#d4880a');
    ctx.fillStyle = '#7a3800';
    for (let i = 0; i < T; i += 8) ctx.fillRect(sx + i, sy, 1, T);
    ctx.fillRect(sx, sy + 8, T, 1);
    ctx.fillRect(sx, sy + 16, T, 1);
    ctx.fillRect(sx, sy + 24, T, 1);
  }

  else if (tile.type === 2) { // Brick
    if (tile.hit) {
      drawPixelRect(sx, sy, T, T, C.brickSh);
    } else {
      drawPixelRect(sx, sy, T, T, C.brick);
      ctx.fillStyle = C.brickSh;
      ctx.fillRect(sx, sy + T/2, T, 2);
      ctx.fillRect(sx + T/2, sy, 2, T/2);
      ctx.fillRect(sx, sy + T/2 + 2, 2, T/2 - 2);
      ctx.fillRect(sx + T - 2, sy + T/2 + 2, 2, T/2 - 2);
    }
  }

  else if (tile.type === 3 || tile.type === 7) { // ? block / used
    const bg = tile.hit ? '#888' : C.qBlock;
    const sh = tile.hit ? '#555' : C.qSh;
    drawPixelRect(sx, sy, T, T, bg);
    ctx.fillStyle = sh;
    ctx.fillRect(sx, sy + T - 3, T, 3);
    ctx.fillRect(sx + T - 3, sy, 3, T);
    if (!tile.hit) {
      ctx.fillStyle = C.qShine;
      ctx.fillRect(sx + 3, sy + 3, 3, 3);
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 18px monospace';
      ctx.fillText('?', sx + 10, sy + 23);
    }
  }

  else if (tile.type === 4) { // Pipe body
    drawPixelRect(sx, sy, T, T, C.pipe);
    drawPixelRect(sx + 2, sy, 4, T, C.pipeLt);
    ctx.fillStyle = C.pipeDk;
    ctx.fillRect(sx + T - 3, sy, 3, T);
  }

  else if (tile.type === 5) { // Pipe top (collar)
    drawPixelRect(sx - 3, sy, T + 6, T, C.pipe);
    drawPixelRect(sx - 1, sy + 3, 6, T - 3, C.pipeLt);
    ctx.fillStyle = C.pipeDk;
    ctx.fillRect(sx + T + 1, sy, 2, T);
    ctx.fillRect(sx - 3, sy, T + 6, 4);
  }

  else if (tile.type === 8) { // Stone/solid
    drawPixelRect(sx, sy, T, T, '#888');
    ctx.fillStyle = '#555';
    ctx.fillRect(sx, sy, T, 2);
    ctx.fillRect(sx, sy, 2, T);
    ctx.fillStyle = '#aaa';
    ctx.fillRect(sx + 2, sy + 2, T - 4, T - 4);
    ctx.fillStyle = '#888';
    ctx.fillRect(sx + T/2, sy, 2, T);
    ctx.fillRect(sx, sy + T/2, T, 2);
  }
}

function drawPlayer(p, cam) {
  const x = Math.round(p.x - cam);
  const y = Math.round(p.y);
  const w = p.w, h = p.h;
  const flip = p.dir < 0;

  ctx.save();
  if (flip) { ctx.translate(x + w/2, 0); ctx.scale(-1,1); ctx.translate(-w/2, 0); } else ctx.translate(x, 0);

  const bx = 0, by = y;

  // Hat
  ctx.fillStyle = C.playerR;
  ctx.fillRect(bx + 2, by, w - 4, 5);
  ctx.fillRect(bx - 1, by + 3, w + 2, 4);

  // Face
  ctx.fillStyle = C.playerS;
  ctx.fillRect(bx + 2, by + 7, w - 2, 7);

  // Eyes
  ctx.fillStyle = '#000';
  ctx.fillRect(bx + w - 9, by + 8, 3, 3);

  // Moustache
  ctx.fillStyle = '#5a2d00';
  ctx.fillRect(bx + 4, by + 12, w - 5, 3);

  // Body (overalls)
  ctx.fillStyle = C.playerB;
  ctx.fillRect(bx + 1, by + 14, w - 2, h - 14);

  // Buttons
  ctx.fillStyle = C.playerR;
  ctx.fillRect(bx + 5,  by + 15, 3, 3);
  ctx.fillRect(bx + w - 8, by + 15, 3, 3);

  // Legs (animated)
  const legFrame = (p.onGround && Math.abs(p.vx) > 0.5)
    ? Math.floor(Date.now() / 100) % 2 : 0;
  ctx.fillStyle = C.playerB;
  if (legFrame === 0) {
    ctx.fillRect(bx + 2,  by + h - 8, 8, 8);
    ctx.fillRect(bx + w - 10, by + h - 6, 8, 6);
  } else {
    ctx.fillRect(bx + 2,  by + h - 6, 8, 6);
    ctx.fillRect(bx + w - 10, by + h - 8, 8, 8);
  }
  // Shoes
  ctx.fillStyle = '#2a1800';
  ctx.fillRect(bx + 1, by + h - 3, 10, 3);
  ctx.fillRect(bx + w - 11, by + h - 3, 10, 3);

  ctx.restore();

  // Big mode crown indicator
  if (p.big) {
    ctx.fillStyle = '#ffd700';
    ctx.font = '10px monospace';
    ctx.fillText('★', x + w/2 - 4, y - 2);
  }
}

function drawEnemy(e, cam) {
  const x = Math.round(e.x - cam);
  const y = Math.round(e.y);

  if (e.dead) {
    // Squished goomba
    ctx.fillStyle = C.goomba;
    ctx.fillRect(x, y + e.h - 6, e.w, 6);
    return;
  }
  if (e.shellSlide) {
    ctx.fillStyle = C.shell;
    ctx.fillRect(x + 2, y + 4, e.w - 4, e.h - 8);
    ctx.fillStyle = C.koopa;
    ctx.fillRect(x + 4, y + 8, e.w - 8, e.h - 16);
    return;
  }

  if (e.type === 'goomba') {
    // Body
    ctx.fillStyle = C.goomba;
    ctx.fillRect(x, y + 4, e.w, e.h - 4);
    // Head
    ctx.fillStyle = C.goomba;
    ctx.fillRect(x + 2, y, e.w - 4, 10);
    // Eyes
    ctx.fillStyle = '#fff';
    ctx.fillRect(x + 4, y + 2, 5, 5);
    ctx.fillRect(x + e.w - 9, y + 2, 5, 5);
    ctx.fillStyle = '#000';
    ctx.fillRect(x + 5, y + 3, 3, 3);
    ctx.fillRect(x + e.w - 8, y + 3, 3, 3);
    // Angry brows
    ctx.fillStyle = C.goombaDk;
    ctx.fillRect(x + 3, y + 1, 5, 2);
    ctx.fillRect(x + e.w - 8, y + 1, 5, 2);
    // Feet
    const ff = Math.floor(Date.now() / 150) % 2;
    ctx.fillStyle = C.goombaDk;
    ctx.fillRect(x + (ff ? 2 : 0),  y + e.h - 4, 8, 4);
    ctx.fillRect(x + e.w - (ff ? 10 : 8), y + e.h - 4, 8, 4);
  }

  else if (e.type === 'koopa') {
    // Shell
    ctx.fillStyle = C.shell;
    ctx.fillRect(x + 2, y + 6, e.w - 4, e.h - 10);
    // Shell pattern
    ctx.fillStyle = '#6a9a00';
    ctx.fillRect(x + e.w/2 - 2, y + 8, 4, e.h - 16);
    ctx.fillRect(x + 4, y + e.h/2, e.w - 8, 3);
    // Head
    ctx.fillStyle = C.koopa;
    ctx.fillRect(x + 4, y, e.w - 8, 10);
    // Eyes
    ctx.fillStyle = '#fff';
    ctx.fillRect(x + 6, y + 1, 4, 4);
    ctx.fillRect(x + e.w - 10, y + 1, 4, 4);
    ctx.fillStyle = '#000';
    ctx.fillRect(x + 7, y + 2, 2, 2);
    ctx.fillRect(x + e.w - 9, y + 2, 2, 2);
    // Feet
    ctx.fillStyle = C.koopa;
    ctx.fillRect(x + 2, y + e.h - 5, 7, 5);
    ctx.fillRect(x + e.w - 9, y + e.h - 5, 7, 5);
  }
}

function drawCoin(coin, cam) {
  if (coin.collected) return;
  const x = coin.x - cam;
  const y = coin.y + Math.sin(Date.now() / 300 + coin.x) * 2;
  ctx.fillStyle = C.coin;
  ctx.beginPath();
  ctx.ellipse(x + 8, y + 8, 5, 8, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#fff8';
  ctx.fillRect(x + 6, y + 4, 2, 4);
}

function drawFloatingText(ft, cam) {
  ctx.globalAlpha = ft.alpha;
  ctx.fillStyle = ft.color || C.coin;
  ctx.font = `bold ${ft.size || 16}px monospace`;
  ctx.fillText(ft.text, ft.x - cam, ft.y);
  ctx.globalAlpha = 1;
}

function drawParticle(p, cam) {
  ctx.globalAlpha = p.life / p.maxLife;
  ctx.fillStyle = p.color;
  ctx.fillRect(p.x - cam, p.y, p.w, p.h);
  ctx.globalAlpha = 1;
}

function drawFlag(flagX, cam, collected) {
  const x = flagX - cam;
  // Pole
  ctx.fillStyle = C.flagPo;
  ctx.fillRect(x, 60, 4, GAME_H - 100 - 60);
  // Flag
  ctx.fillStyle = collected ? '#fff' : C.flag;
  ctx.beginPath();
  ctx.moveTo(x + 4, 60);
  ctx.lineTo(x + 30, 75);
  ctx.lineTo(x + 4, 90);
  ctx.fill();
  // Ball on top
  ctx.fillStyle = C.flag;
  ctx.beginPath();
  ctx.arc(x + 2, 60, 5, 0, Math.PI * 2);
  ctx.fill();
}

function drawBackground(level, cam) {
  // Sky gradient
  const grad = ctx.createLinearGradient(0, 0, 0, GAME_H);
  grad.addColorStop(0, level.bg[0]);
  grad.addColorStop(1, level.bg[1]);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, GAME_W, GAME_H);

  // Stars for dark levels
  if (level.bg[0] === '#1a1a3e' || level.bg[0] === '#1a0a0a') {
    ctx.fillStyle = '#fff';
    const stars = [[50,30],[150,50],[280,20],[400,45],[550,25],[680,40],[750,15],
                   [100,80],[320,70],[500,60],[620,85],[730,65]];
    stars.forEach(([sx, sy]) => {
      const px = ((sx - cam * 0.1) % GAME_W + GAME_W) % GAME_W;
      ctx.fillRect(px, sy, 2, 2);
    });
  }

  // Clouds (parallax, only for daytime)
  if (level.bg[0] === '#5c94fc') {
    ctx.fillStyle = '#fff';
    const cloudPositions = [100, 350, 600, 900, 1200, 1500, 1800, 2200, 2600, 3000];
    cloudPositions.forEach((cx, i) => {
      const px = cx - cam * 0.3;
      const py = 40 + (i % 3) * 30;
      if (px > -100 && px < GAME_W + 100) {
        ctx.beginPath();
        ctx.arc(px + 20, py, 18, 0, Math.PI*2);
        ctx.arc(px + 38, py - 8, 22, 0, Math.PI*2);
        ctx.arc(px + 58, py, 18, 0, Math.PI*2);
        ctx.fill();
      }
    });
  }

  // Mountains (parallax)
  ctx.fillStyle = level.bg[0] === '#5c94fc' ? '#3a7aec' : '#2a2a5a';
  for (let i = 0; i < 6; i++) {
    const mx = (i * 600 - cam * 0.15) % (GAME_W + 400) - 100;
    const mh = 80 + (i % 3) * 40;
    ctx.beginPath();
    ctx.moveTo(mx, GAME_H - 60);
    ctx.lineTo(mx + 150, GAME_H - 60 - mh);
    ctx.lineTo(mx + 300, GAME_H - 60);
    ctx.fill();
  }
}

function drawHUD(state) {
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(0, 0, GAME_W, 36);

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 14px monospace';
  ctx.fillText(`MARIO`, 20, 22);
  ctx.fillText(String(state.score).padStart(6,'0'), 20, 34);

  ctx.fillText(`★ ${state.lives}`, GAME_W/2 - 30, 22);
  ctx.fillText(LEVELS[state.level].name, GAME_W/2 - 40, 34);

  ctx.fillText(`🪙 ${state.coins}`, GAME_W - 100, 22);

  // Timer
  const t = Math.max(0, Math.ceil((400000 - state.timer) / 1000));
  ctx.fillStyle = t < 60 ? '#f88' : '#fff';
  ctx.fillText(`TIME ${t}`, GAME_W - 100, 34);
}

// ================================================================
//  Physics & collision helpers
// ================================================================
function rectOverlap(ax, ay, aw, ah, bx, by, bw, bh) {
  return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
}

function tileIsSolid(type) {
  return type === 1 || type === 2 || type === 3 || type === 7 || type === 8 || type === 4 || type === 5;
}

function collideTilesX(entity, tiles) {
  for (const t of tiles) {
    if (!tileIsSolid(t.type)) continue;
    if (rectOverlap(entity.x, entity.y + 2, entity.w, entity.h - 4, t.x, t.y, TILE, TILE)) {
      if (entity.vx > 0) entity.x = t.x - entity.w;
      else if (entity.vx < 0) entity.x = t.x + TILE;
      entity.vx = 0;
      return t;
    }
  }
  return null;
}

function collideTilesY(entity, tiles) {
  let hit = null;
  for (const t of tiles) {
    if (!tileIsSolid(t.type)) continue;
    if (rectOverlap(entity.x + 2, entity.y, entity.w - 4, entity.h, t.x, t.y, TILE, TILE)) {
      if (entity.vy > 0) {
        entity.y = t.y - entity.h;
        entity.vy = 0;
        entity.onGround = true;
        hit = t;
      } else if (entity.vy < 0) {
        entity.y = t.y + TILE;
        entity.vy = 0;
        hit = t;
        return { tile: t, fromBelow: true };
      }
    }
  }
  return hit ? { tile: hit, fromBelow: false } : null;
}

// ================================================================
//  Game state
// ================================================================
const INIT_STATE = () => ({
  phase:   'title',   // title | playing | paused | dead | win
  level:   0,
  score:   0,
  lives:   3,
  coins:   0,
  timer:   0,
  hiScore: 0,
});

let gs = INIT_STATE();

// Per-level entities (rebuilt on each level load)
let player, enemies, coins, particles, floatingTexts;
let cam = 0;
let flagCollected = false;

// ── Player factory ─────────────────────────────────────────────
function makePlayer(lv) {
  return {
    x: lv.playerStart.x,
    y: lv.playerStart.y,
    w: 20, h: 28,
    vx: 0, vy: 0,
    onGround: false,
    dir: 1,
    big: false,
    invincible: 0,
    deadTimer: 0,
  };
}

// ── Enemy factory ─────────────────────────────────────────────
function makeEnemies(lv) {
  return lv.enemies.map(e => ({
    type: e.type,
    x: e.tx * TILE,
    y: e.ty * TILE,
    w: e.type === 'koopa' ? 24 : 22,
    h: e.type === 'koopa' ? 30 : 22,
    vx: -1,
    vy: 0,
    onGround: false,
    dead: false,
    deadTimer: 0,
    shellSlide: false,
    shellTimer: 0,
  }));
}

function makeCoins(lv) {
  const arr = [];
  // Coins from level data
  lv.coins.forEach(c => arr.push({ x: c.tx * TILE + 8, y: c.ty * TILE + 8, collected: false }));
  // Also scan tiles for type 6
  lv.tiles.filter(t => t.type === 6).forEach(t =>
    arr.push({ x: t.x + 8, y: t.y + 8, collected: false })
  );
  return arr;
}

function loadLevel(idx) {
  const lv = LEVELS[idx];
  player       = makePlayer(lv);
  enemies      = makeEnemies(lv);
  coins        = makeCoins(lv);
  particles    = [];
  floatingTexts = [];
  cam          = 0;
  flagCollected = false;
}

function spawnParticles(x, y, color, count = 6) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 6,
      vy: -(Math.random() * 5 + 2),
      w: 6 + Math.random() * 6,
      h: 6 + Math.random() * 6,
      color,
      life: 40, maxLife: 40,
    });
  }
}

function spawnFloatText(text, x, y, color = C.coin) {
  floatingTexts.push({ text, x, y, vy: -1.5, alpha: 1, color, size: 14 });
}

// ================================================================
//  Input
// ================================================================
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'KeyP' && gs.phase === 'playing') gs.phase = 'paused';
  else if (e.code === 'KeyP' && gs.phase === 'paused') gs.phase = 'playing';
  if (e.code === 'KeyR') { loadLevel(gs.level); gs.phase = 'playing'; }
  e.preventDefault();
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

function input() {
  const running = keys['ShiftLeft'] || keys['ShiftRight'];
  const maxVx   = running ? 5 : 3.5;

  if (keys['ArrowLeft'] || keys['KeyA']) {
    player.vx = Math.max(player.vx - 0.5, -maxVx);
    player.dir = -1;
  } else if (keys['ArrowRight'] || keys['KeyD']) {
    player.vx = Math.min(player.vx + 0.5, maxVx);
    player.dir = 1;
  } else {
    player.vx *= 0.8;
    if (Math.abs(player.vx) < 0.1) player.vx = 0;
  }

  const jumpPressed = keys['ArrowUp'] || keys['KeyW'] || keys['Space'] || keys['KeyZ'];
  if (jumpPressed && player.onGround) {
    player.vy = player.big ? -11 : -10;
    player.onGround = false;
    SFX.jump();
  }
}

// ================================================================
//  Update
// ================================================================
let lastTime = 0;
function update(dt) {
  if (gs.phase !== 'playing') return;

  gs.timer += dt;
  const lv = LEVELS[gs.level];

  // ── Player dead arc ────────────────────────────────────────
  if (player.deadTimer > 0) {
    player.deadTimer--;
    player.vy += GRAVITY;
    player.y  += player.vy;
    if (player.deadTimer <= 0) {
      gs.lives--;
      if (gs.lives <= 0) {
        gs.phase = 'gameover';
        SFX.die();
      } else {
        loadLevel(gs.level);
      }
    }
    return;
  }

  // ── Input ──────────────────────────────────────────────────
  input();

  // ── Player physics ─────────────────────────────────────────
  player.vy += GRAVITY;
  player.onGround = false;

  player.x += player.vx;
  collideTilesX(player, lv.tiles);
  player.x = Math.max(0, player.x);

  player.y += player.vy;
  const hitY = collideTilesY(player, lv.tiles);
  if (hitY) {
    if (hitY.fromBelow) {
      // Hit block from below
      const t = hitY.tile;
      if (t.type === 3 && !t.hit) {
        // ? block
        t.hit = true;
        t.type = 7;
        SFX.block();
        // Spawn mushroom or coin
        if (!player.big) {
          // Power-up mushroom effect
          player.big = true;
          player.h   = 36;
          player.y  -= 8;
          SFX.mushroom();
          spawnFloatText('POWER UP!', t.x, t.y - 20, '#f80');
        } else {
          gs.coins++;
          gs.score += 200;
          spawnFloatText('+200', t.x, t.y - 10);
          SFX.coin();
        }
        spawnParticles(t.x + TILE/2, t.y, C.qBlock);
      } else if (t.type === 2 && !t.hit) {
        // Brick
        if (player.big) {
          t.hit = true;
          gs.score += 50;
          spawnParticles(t.x + TILE/2, t.y + TILE/2, C.brick, 8);
          SFX.block();
        } else {
          SFX.block();
        }
      }
    }
  }

  // Pit death
  if (player.y > GAME_H + 100) {
    killPlayer();
    return;
  }

  // ── Invincibility frames ───────────────────────────────────
  if (player.invincible > 0) player.invincible--;

  // ── Camera ─────────────────────────────────────────────────
  const targetCam = player.x - GAME_W * 0.35;
  cam = Math.max(0, Math.min(targetCam, lv.width - GAME_W));

  // ── Coins ──────────────────────────────────────────────────
  coins.forEach(c => {
    if (c.collected) return;
    if (rectOverlap(player.x, player.y, player.w, player.h, c.x - 8, c.y - 8, 16, 16)) {
      c.collected = true;
      gs.coins++;
      gs.score += 100;
      SFX.coin();
      spawnFloatText('+100', c.x, c.y);
    }
  });

  // ── Enemies ────────────────────────────────────────────────
  enemies.forEach(e => {
    if (e.dead && e.deadTimer > 0) { e.deadTimer--; return; }
    if (e.dead && e.deadTimer <= 0) return;

    e.vy += GRAVITY;
    e.onGround = false;

    e.x += e.vx;
    const ex = collideTilesX(e, lv.tiles);
    if (ex) e.vx = -e.vx;

    e.y += e.vy;
    collideTilesY(e, lv.tiles);

    // Turn at ledge
    const ledgeCheckX = e.vx > 0 ? e.x + e.w + 2 : e.x - 2;
    let overLedge = true;
    for (const t of lv.tiles) {
      if (tileIsSolid(t.type) &&
          t.x < ledgeCheckX + 4 && t.x + TILE > ledgeCheckX &&
          t.y >= e.y + e.h && t.y < e.y + e.h + TILE) {
        overLedge = false;
        break;
      }
    }
    if (overLedge && e.onGround) e.vx = -e.vx;

    // Pit
    if (e.y > GAME_H + 50) { e.dead = true; return; }

    // Shell slide
    if (e.shellSlide) {
      e.shellTimer--;
      if (e.shellTimer <= 0) e.shellSlide = false;
    }

    // Player vs enemy
    if (!e.dead && !e.shellSlide && player.invincible <= 0 &&
        rectOverlap(player.x, player.y, player.w, player.h, e.x, e.y, e.w, e.h)) {

      const playerBottom = player.y + player.h;
      const enemyTop     = e.y + 6;

      if (player.vy > 0 && playerBottom < e.y + e.h * 0.6) {
        // Stomp
        SFX.stomp();
        gs.score += 200;
        spawnFloatText('+200', e.x, e.y - 8, '#f88');
        spawnParticles(e.x + e.w/2, e.y + e.h/2, C.goomba);

        if (e.type === 'goomba') {
          e.dead = true;
          e.deadTimer = 30;
        } else if (e.type === 'koopa') {
          if (!e.shellSlide) {
            e.shellSlide = true;
            e.shellTimer = 300;
            e.vx = (player.x < e.x) ? 5 : -5;
          } else {
            e.dead = true;
            e.deadTimer = 30;
          }
        }
        player.vy = -7; // Bounce
      } else {
        // Take damage
        if (player.big) {
          player.big = false;
          player.h   = 28;
          player.invincible = 120;
          spawnFloatText('OW!', player.x, player.y - 10, '#f88');
        } else if (player.invincible <= 0) {
          killPlayer();
        }
      }
    }
  });

  // ── Flag ───────────────────────────────────────────────────
  if (!flagCollected &&
      player.x + player.w > lv.flagX - 5 &&
      player.x < lv.flagX + 30) {
    flagCollected = true;
    SFX.flag();
    const bonus = Math.max(100, Math.ceil((400000 - gs.timer) / 100));
    gs.score += bonus;
    gs.score += gs.coins * 50;
    spawnFloatText(`+${bonus}`, lv.flagX, 200, '#0f0');

    setTimeout(() => {
      if (gs.level + 1 < LEVELS.length) {
        gs.level++;
        loadLevel(gs.level);
      } else {
        gs.phase = 'win';
      }
    }, 1500);
  }

  // ── Particles & floating text ──────────────────────────────
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy; p.vy += 0.3;
    p.life--;
  });
  particles = particles.filter(p => p.life > 0);

  floatingTexts.forEach(ft => {
    ft.y   += ft.vy;
    ft.alpha -= 0.02;
  });
  floatingTexts = floatingTexts.filter(ft => ft.alpha > 0);

  // Timer death
  if (gs.timer > 400000) killPlayer();
}

function killPlayer() {
  if (player.deadTimer > 0) return;
  SFX.die();
  player.deadTimer = 90;
  player.vy = -12;
  player.vx = 0;
}

// ================================================================
//  Render
// ================================================================
function render() {
  ctx.clearRect(0, 0, GAME_W, GAME_H);

  if (gs.phase === 'title' || gs.phase === 'gameover' || gs.phase === 'win') return;

  const lv = LEVELS[gs.level];

  drawBackground(lv, cam);

  // Tiles
  lv.tiles.forEach(t => {
    if (t.x - cam > -TILE && t.x - cam < GAME_W + TILE) drawTile(t, cam);
  });

  // Flag
  drawFlag(lv.flagX, cam, flagCollected);

  // Coins
  coins.forEach(c => { if (!c.collected) drawCoin(c, cam); });

  // Enemies
  enemies.forEach(e => {
    if (e.x - cam > -50 && e.x - cam < GAME_W + 50) drawEnemy(e, cam);
  });

  // Player (blinking when invincible)
  if (player.deadTimer === 0) {
    if (player.invincible === 0 || Math.floor(player.invincible / 4) % 2 === 0) {
      drawPlayer(player, cam);
    }
  } else {
    drawPlayer(player, cam);
  }

  // Particles
  particles.forEach(p => drawParticle(p, cam));

  // Floating texts
  floatingTexts.forEach(ft => drawFloatingText(ft, cam));

  // Pause overlay
  if (gs.phase === 'paused') {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, GAME_W, GAME_H);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 36px monospace';
    ctx.fillText('PAUSED', GAME_W/2 - 64, GAME_H/2);
    ctx.font = '16px monospace';
    ctx.fillText('Press P to continue', GAME_W/2 - 80, GAME_H/2 + 32);
  }

  // HUD
  drawHUD(gs);
}

// ================================================================
//  Main loop
// ================================================================
function loop(ts) {
  const dt = Math.min(ts - lastTime, 33); // cap at ~30fps min
  lastTime = ts;
  update(dt);
  render();
  requestAnimationFrame(loop);
}

// ================================================================
//  UI overlays
// ================================================================
const titleEl   = document.getElementById('overlay');
const goEl      = document.getElementById('gameover');
const winEl     = document.getElementById('win');

// Patch: find them properly
const overlays = document.querySelectorAll('[id="overlay"]');
const [titleScreen, gameoverScreen, winScreen] = overlays;

function showTitle()    { titleScreen.style.display='flex'; gameoverScreen.style.display='none'; winScreen.style.display='none'; }
function showGameOver() { titleScreen.style.display='none'; gameoverScreen.style.display='flex'; winScreen.style.display='none'; }
function showWin()      { titleScreen.style.display='none'; gameoverScreen.style.display='none'; winScreen.style.display='flex'; }
function hideAll()      { titleScreen.style.display='none'; gameoverScreen.style.display='none'; winScreen.style.display='none'; }

document.getElementById('btnStart').addEventListener('click', startGame);
document.getElementById('btnRetry').addEventListener('click', retryGame);
document.getElementById('btnPlayAgain').addEventListener('click', () => { gs = INIT_STATE(); startGame(); });

function startGame() {
  getAudio(); // unlock audio context
  gs = INIT_STATE();
  gs.phase = 'playing';
  loadLevel(0);
  hideAll();
}

function retryGame() {
  const { hiScore } = gs;
  gs = INIT_STATE();
  gs.hiScore = hiScore;
  gs.phase = 'playing';
  loadLevel(0);
  hideAll();
}

// Watch for phase changes
let lastPhase = '';
function checkPhase() {
  if (gs.phase === lastPhase) return;
  lastPhase = gs.phase;
  if (gs.phase === 'gameover') {
    document.getElementById('goScore').textContent = `Score: ${gs.score}`;
    const msgs = [
      'Better luck next time!',
      "Don't give up!",
      'So close! Try again.',
      'The mushrooms were worth it.',
    ];
    document.getElementById('goMsg').textContent = msgs[Math.floor(Math.random() * msgs.length)];
    showGameOver();
  }
  if (gs.phase === 'win') {
    document.getElementById('winScore').textContent = `Final Score: ${gs.score}`;
    showWin();
  }
}

// ── Kick off ──────────────────────────────────────────────────
showTitle();
loadLevel(0);
requestAnimationFrame(ts => { lastTime = ts; requestAnimationFrame(loop); });
setInterval(checkPhase, 100);
</script>
